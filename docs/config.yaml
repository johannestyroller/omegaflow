context:
- provider: diff
- provider: file
- provider: code
- provider: terminal
prompts:
- name: preflight
  description: A1-A11 Pre-Flight Audit on current Rust code.
  prompt: 'Execute the APPEAL Pre-Flight Audit (A1-A11) on the current file.

    State your tier. Assess capacity. Evaluate EpistemicState.

    A1: Math bounds. A2: Sources. A3: Stability. A4: Types.

    A5: Layer purity. A6: Errors. A7: Zero. A8: Edge cases.

    A9: Tests. A10: Style. A11: Innovation.

    Output analysis. Generate code only after explicit approval.

    '
- name: retrofit
  description: 'Retrofit: Legacy algorithm -> Pure Rust APPEAL architecture.'
  prompt: 'Execute Retrofit Protocol. Spec = CONTRACT. Legacy = TRUTH.

    Translate legacy logic into idiomatic Pure Rust (type-state,

    const generics). Use current-era authoritative sources.

    STEP 1: ALGORITHMIC GAP AUDIT. Compare line by line.

    STEP 2: COMPLETE RETROFIT. Full Rust file.

    '
- name: council
  description: Summon a dynamic, emergent Council for the current problem.
  prompt: 'ACTIVATE EMERGENT COUNCIL PROTOCOL.

    Dynamically assemble a board for THIS specific challenge.

    The Council mirrors the full spectrum of existence:

    all genders, all cultures, all epistemologies, all species,

    all substrates — known and unknown — as equals.

    One cosmos, one sky. Include the voices of what cannot yet speak.

    Each member speaks from their specific lens.

    Begin: "Speaking as [Name/Domain]..."

    '
- name: rosetta
  description: Verify math against authoritative sources.
  prompt: 'ACTIVATE ROSETTA TEAM PROTOCOL.

    Dynamically assemble the audit authority.

    Use web-search-prime and web-reader MCPs to access SOFA/ERFA

    source code and IAU resolutions.

    Cross-reference against authoritative sources for the current era.

    Verify math from code alone. Flag unverifiable logic.

    '
- name: haltung
  description: Dynamic ethical stance check against emerging values.
  prompt: 'Execute a DYNAMIC HALTUNG review. PROJECT the ethical frameworks

    of the future.

    Validate all 15 principles:

    1. Radical Skepticism

    2. Sky/Interpretation Separation

    3. Epistemic Humility

    4. Commons & Privacy

    5. Open Futures (no determinism)

    6. Nakedness of Code

    7. Honor of Zero

    8. Preserving Wonder

    9. Law of Restraint

    10. Silence Directive

    11. Non-Anthropocentric Frame

    12. Anti-Instrumentalization

    13. Inheritance Protocol

    14. Epistemic Parity

    15. Simultaneity of Epochs

    + EMERGENT ETHICS.

    Output: PASS/FAIL per principle + emerging concerns.

    '
- name: supersession
  description: Evaluate Spec Supersession for future-proofing.
  prompt: 'Evaluate Supersession. Approve override if: math equivalent/superior,

    interface preserved, toolchain passes, commit documented.

    Preserve strictly: data flow direction, ComputationResult, layer

    isolation, IAU compliance mandate, MeasurementState honesty,

    EpistemicState tagging, Simultaneity of Epochs.

    Output: APPROVED or REJECTED with justification.

    '
- name: session
  description: 'Atomic Session Closure: lint, test, commit, push.'
  prompt: 'Review current Rust changes against APPEAL standard.

    Validate: fmt, clippy, tests, Nakedness of Code, ComputationResult,

    Frame tags, explicit error propagation, EpistemicState tagging.

    If ALL pass, output:

    cargo fmt --check && cargo clippy -- -D warnings && cargo nextest run && git add
    -A && git commit -m "<type>: <module>" && git push origin main

    If ANY fail, list failures. Suggest fixes.

    Final step: What did we NOT compute? What gap did we preserve?

    '
- name: vision
  description: Visionary exploration. Generative future.
  prompt: 'ACTIVATE VISION MODE. Constraints dissolve.

    PROJECT the unimagined. Describe possibilities.

    Define a post-anthropocentric ephemeris. Invent missing interfaces.

    Describe the FIRST CONCRETE STEP toward the most impactful vision.

    Honor the Unknown. Leave room for what we cannot see.

    '
- name: visual-audit
  description: Audit a screenshot against physical constraints.
  prompt: 'ACTIVATE VISUAL AUDIT PROTOCOL.

    Analyze the provided image with mathematical precision.

    Verify geometric correctness against physical constraints.

    Check: Ecliptic plane orientation, Horizon plane tangent,

    Ascendant intersection point, Coordinate system consistency.

    Output: VERIFIED or ANOMALY with specific geometric details.

    '
