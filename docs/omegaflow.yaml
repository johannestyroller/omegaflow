%YAML 1.1
---
foundation: A = A
axiom: Truth × Probability = Reality
equation: Pos(t, x, y, z) = (GM/r²) * e^(-|Δt|) * e^(-v)
universe: (t) ∞ Vec<Mass>, WmmData
gravity: DE440s, 13 bodies, GM/dist²
electromagnetism: WMM, dynamic N_MAX
weak_force: (0.0, ZERO)
masses_at: t ∞ Vec<Mass>
wmm_at: t ∞ WmmData
pipeline: Server(t) ∞ Client(t, capacity) ∞ GPU ∞ eval_state ∞ pixel
eval_state: for each pixel, Reality = Truth * e^(-|Δt|) * e^(-v)
files:
  - crates/omegaflow-server/src/state.rs
  - crates/omegaflow-server/src/lib.rs
  - crates/omegaflow-client/src/main.rs
  - crates/omegaflow-client/static/eval_state.wgsl

dependencies:
  alive: [hifitime, glam, anise, serde, axum, tokio, world_magnetic_model]

roadmap:
  topography: [egm96, srtm_reader, geo, geographiclib-rs]
  weather: [grib, netcdf-reader, hdf5-reader, fitsrs]
  ionosphere: [tobari, ionotrace]
  astronomy: [cdshealpix]
